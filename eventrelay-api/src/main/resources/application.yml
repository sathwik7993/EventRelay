spring:
  application:
    name: eventrelay-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventrelay}
    username: ${DB_USERNAME:eventrelay}
    password: ${DB_PASSWORD:eventrelay}
    hikari:
      maximum-pool-size: 10
      pool-name: eventrelay-pool
  jpa:
    hibernate:
      ddl-auto: validate          # schema is owned by Flyway, never by Hibernate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 500ms

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      group:
        readiness:
          include: db
        liveness:
          include: ping
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

eventrelay:
  idempotency:
    ttl-hours: 24                 # Redis dedup-cache TTL for Idempotency-Key
  rate-limit:
    default-rps: 100              # per-tenant token-bucket rate (override via tenant settings)
  security:
    # SSRF guard on subscription target URLs. Secure by default; set both to true
    # for local development so subscriptions can point at a receiver on localhost.
    allow-insecure-target-urls: ${ALLOW_INSECURE_TARGET_URLS:false}
    allow-private-target-urls: ${ALLOW_PRIVATE_TARGET_URLS:false}
  auth:
    # bcrypt is ~300ms of CPU per verification; cache successful verifications so
    # it is not paid on every request. Revocation takes effect within this window.
    cache-ttl-seconds: 60
    cache-max-entries: 10000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.eventrelay: DEBUG
