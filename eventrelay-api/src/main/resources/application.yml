spring:
  application:
    name: eventrelay-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventrelay}
    username: ${DB_USERNAME:eventrelay}
    password: ${DB_PASSWORD:eventrelay}
    hikari:
      maximum-pool-size: 10
      pool-name: eventrelay-pool
  jpa:
    hibernate:
      ddl-auto: validate          # schema is owned by Flyway, never by Hibernate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 500ms

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      group:
        readiness:
          include: db
        liveness:
          include: ping

eventrelay:
  idempotency:
    ttl-hours: 24                 # Redis dedup-cache TTL for Idempotency-Key

logging:
  level:
    com.eventrelay: DEBUG
