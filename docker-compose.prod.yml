# Production stack for a single host (e.g. a DigitalOcean droplet).
# Postgres and Redis run alongside the two services; SQS is real AWS
# (permanently free up to 1M requests/month), so leave SQS_ENDPOINT empty.
#
#   cp .env.prod.example .env && edit it
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      args:
        MODULE: eventrelay-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      JAVA_OPTS: "-XX:MaxRAMPercentage=60"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  dispatcher:
    build:
      context: .
      args:
        MODULE: eventrelay-dispatcher
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      api: { condition: service_healthy }   # API owns Flyway migrations
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8081
      # Real AWS SQS: leave the endpoint empty so the default AWS resolution applies.
      SQS_ENDPOINT: ""
      AWS_REGION: ${AWS_REGION}
      SQS_QUEUE_NAME: ${SQS_QUEUE_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      JAVA_OPTS: "-XX:MaxRAMPercentage=60"
    ports:
      - "8081:8081"

  dashboard:
    build:
      context: ./eventrelay-dashboard
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    ports:
      - "80:80"

volumes:
  pgdata:
