spring:
  application:
    name: eventrelay-dispatcher
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventrelay}
    username: ${DB_USERNAME:eventrelay}
    password: ${DB_PASSWORD:eventrelay}
    hikari:
      maximum-pool-size: 10
      pool-name: dispatcher-pool
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  # Flyway runs from the API service (single schema owner); the dispatcher only reads/writes.
  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

eventrelay:
  sqs:
    endpoint: ${SQS_ENDPOINT:http://localhost:4566}   # LocalStack; unset for real AWS
    region: ${AWS_REGION:us-east-1}
    queue-name: ${SQS_QUEUE_NAME:eventrelay-deliveries}
    visibility-timeout-seconds: 60
    wait-time-seconds: 10           # long polling
  relay:
    poll-interval-ms: 500
    batch-size: 100
  scheduler:
    poll-interval-ms: 1000
    batch-size: 100
    lease-seconds: 120              # reclaim QUEUED rows stuck longer than this
  worker:
    concurrency: 2
  delivery:
    max-attempts: 8
    http-timeout-ms: 30000
  circuit:
    failure-threshold: 5          # consecutive failures before a subscription's circuit opens
    cooldown-seconds: 30          # how long to skip deliveries while open
  security:
    # Re-checked at delivery time (DNS rebinding defence). Must match the API's setting.
    allow-insecure-target-urls: ${ALLOW_INSECURE_TARGET_URLS:false}
    allow-private-target-urls: ${ALLOW_PRIVATE_TARGET_URLS:false}

logging:
  level:
    com.eventrelay: DEBUG
    software.amazon.awssdk: WARN
