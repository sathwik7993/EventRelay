# EventRelay local development infrastructure.
# Runs the backing services; the Spring Boot apps run natively (mvn spring-boot:run)
# for fast iteration. SQS is emulated by LocalStack (used from Milestone 2 onward).
services:
  postgres:
    image: postgres:15-alpine
    container_name: eventrelay-postgres
    environment:
      POSTGRES_USER: eventrelay
      POSTGRES_PASSWORD: eventrelay
      POSTGRES_DB: eventrelay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventrelay"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eventrelay-redis
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.4
    container_name: eventrelay-localstack
    environment:
      SERVICES: sqs
      DEBUG: "0"
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Observability (optional; `docker compose --profile observability up -d`) ---
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: eventrelay-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    container_name: eventrelay-grafana
    profiles: ["observability"]
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
