name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # Ubuntu runners ship with Docker, so the Testcontainers integration
      # tests (real PostgreSQL) execute here for real.
      - name: Build and run tests
        run: mvn -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*'
          if-no-files-found: ignore

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: eventrelay-jars
          path: |
            eventrelay-api/target/eventrelay-api.jar
            eventrelay-dispatcher/target/eventrelay-dispatcher.jar

  docker:
    name: Build container images
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        module: [eventrelay-api, eventrelay-dispatcher]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.module }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: MODULE=${{ matrix.module }}
          push: false
          tags: ${{ matrix.module }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
